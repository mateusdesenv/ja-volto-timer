<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ja Volto - Timer</title>
    <style>
      :root {
        --green: #53f075;
        --green-soft: #a9ffb7;
        --ink: #eef7f2;
        --muted: rgba(231, 239, 236, 0.72);
        --dark: #070c10;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: var(--dark);
        overflow: hidden;
      }

      body {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
      }

      .stage {
        position: relative;
        display: grid;
        place-items: center;
        width: 100vw;
        height: 100dvh;
        min-height: 100vh;
        isolation: isolate;
        background:
          linear-gradient(180deg, rgba(2, 7, 10, 0.1), rgba(2, 7, 10, 0.34)),
          url("./assets/ja-volto.png") center / cover no-repeat;
      }

      .stage::before,
      .stage::after {
        position: absolute;
        inset: 0;
        z-index: -1;
        content: "";
        pointer-events: none;
      }

      .stage::before {
        background:
          radial-gradient(circle at 50% 4%, rgba(82, 239, 113, 0.18), transparent 28%),
          radial-gradient(circle at 50% 106%, rgba(82, 239, 113, 0.2), transparent 27%),
          linear-gradient(90deg, rgba(2, 7, 10, 0.18), transparent 28%, transparent 72%, rgba(2, 7, 10, 0.18));
      }

      .stage::after {
        background: rgba(2, 7, 10, 0.04);
        backdrop-filter: saturate(1.08);
      }

      .content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: min(86vw, 1160px);
        min-height: 58vh;
        padding-top: clamp(130px, 15vh, 190px);
        text-align: center;
      }

      .timer-wrap {
        position: absolute;
        left: 50%;
        bottom: clamp(54px, 8vh, 94px);
        display: grid;
        gap: clamp(10px, 1.4vw, 18px);
        width: min(82vw, 760px);
        text-align: center;
        transform: translateX(-50%);
      }

      .timer-wrap::before {
        position: absolute;
        inset: clamp(-36px, -3.5vw, -18px) clamp(-72px, -5vw, -26px);
        z-index: -1;
        content: "";
        background:
          radial-gradient(ellipse at 50% 45%, rgba(4, 9, 12, 0.92), rgba(4, 9, 12, 0.76) 42%, transparent 72%),
          linear-gradient(90deg, transparent, rgba(4, 9, 12, 0.76), transparent);
        filter: blur(2px);
      }

      .timer-label {
        margin: 0;
        color: var(--muted);
        font-size: clamp(16px, 1.6vw, 26px);
        font-weight: 400;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        text-shadow: 0 0 18px rgba(2, 7, 10, 0.9);
      }

      .timer {
        margin: 0;
        color: var(--green-soft);
        font-variant-numeric: tabular-nums;
        font-size: clamp(70px, 8.6vw, 142px);
        font-weight: 800;
        line-height: 0.92;
        letter-spacing: 0;
        text-shadow:
          0 0 10px rgba(83, 240, 117, 0.7),
          0 0 34px rgba(83, 240, 117, 0.52),
          0 10px 50px rgba(0, 0, 0, 0.78);
      }

      .status {
        min-height: 1.4em;
        margin: 0;
        color: rgba(241, 247, 244, 0.82);
        font-size: clamp(15px, 1.25vw, 22px);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(2, 7, 10, 0.9);
      }

      .done .timer {
        animation: pulse 1.1s ease-in-out infinite;
      }

      .done .status {
        color: var(--green-soft);
      }

      @keyframes pulse {
        0%,
        100% {
          filter: brightness(1);
          transform: scale(1);
        }

        50% {
          filter: brightness(1.24);
          transform: scale(1.025);
        }
      }

      @media (max-width: 760px) {
        .stage {
          background-size: cover;
        }

        .content {
          width: min(92vw, 620px);
          padding-top: 24vh;
        }

        .timer-wrap {
          bottom: max(34px, 6vh);
          width: min(90vw, 560px);
        }

        .timer-label {
          letter-spacing: 0.2em;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="Tela de pausa da live com contagem regressiva">
      <section class="content">
        <div class="timer-wrap" aria-live="polite">
          <p class="timer-label">Volto em</p>
          <p class="timer" id="timer">00:00</p>
          <p class="status" id="status">preparando pausa</p>
        </div>
      </section>
    </main>

    <script>
      const timerEl = document.querySelector("#timer");
      const statusEl = document.querySelector("#status");
      const root = document.documentElement;
      let intervalId;
      let endAt = 0;

      function parseDuration(value) {
        const text = String(value || "").trim().replace(",", ".");

        if (!text) {
          return 10 * 60;
        }

        if (text.includes(":")) {
          const parts = text.split(":").map((part) => Number(part.trim()));
          if (parts.length === 2 && parts.every(Number.isFinite)) {
            return Math.max(1, Math.round(parts[0] * 60 + parts[1]));
          }

          if (parts.length === 3 && parts.every(Number.isFinite)) {
            return Math.max(1, Math.round(parts[0] * 3600 + parts[1] * 60 + parts[2]));
          }
        }

        const minutes = Number(text);
        if (Number.isFinite(minutes) && minutes > 0) {
          return Math.max(1, Math.round(minutes * 60));
        }

        return 10 * 60;
      }

      function formatTime(totalSeconds) {
        const seconds = Math.max(0, Math.ceil(totalSeconds));
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const remainingSeconds = seconds % 60;

        if (hours > 0) {
          return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(remainingSeconds).padStart(2, "0")}`;
        }

        return `${String(minutes).padStart(2, "0")}:${String(remainingSeconds).padStart(2, "0")}`;
      }

      function updateTimer() {
        const remaining = (endAt - Date.now()) / 1000;
        timerEl.textContent = formatTime(remaining);

        if (remaining <= 0) {
          clearInterval(intervalId);
          document.body.classList.add("done");
          timerEl.textContent = "00:00";
          statusEl.textContent = "voltando agora";
        }
      }

      function startTimer(totalSeconds) {
        endAt = Date.now() + totalSeconds * 1000;
        document.body.classList.remove("done");
        statusEl.textContent = "aguarde um instante";
        updateTimer();
        clearInterval(intervalId);
        intervalId = setInterval(updateTimer, 250);
      }

      function askDuration() {
        const queryMinutes = new URLSearchParams(window.location.search).get("min");
        if (queryMinutes) {
          startTimer(parseDuration(queryMinutes));
          return;
        }

        const initialValue = queryMinutes || "10";
        const answer = window.prompt(
          "Quanto tempo de timer? Digite os minutos. Ex: 10 ou 1:30",
          initialValue
        );

        startTimer(parseDuration(answer || initialValue));
      }

      window.addEventListener("load", askDuration);
      window.addEventListener("keydown", (event) => {
        if (event.key.toLowerCase() === "r") {
          askDuration();
        }
      });
    </script>
  </body>
</html>
